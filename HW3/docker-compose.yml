networks:
  flight-net:
    driver: bridge

services:

  # --------------------------------------------------------------------------
  # Databases
  # --------------------------------------------------------------------------
  booking-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - flight-net
    volumes:
      - booking-pgdata:/var/lib/postgresql/data

  flight-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: flight_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - flight-net
    volumes:
      - flight-pgdata:/var/lib/postgresql/data

  # --------------------------------------------------------------------------
  # Redis Sentinel setup
  # --------------------------------------------------------------------------
  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - flight-net
    volumes:
      - redis-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-replica:
    image: redis:7-alpine
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    ports:
      - "6380:6379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - flight-net
    volumes:
      - redis-replica-data:/data

  redis-sentinel:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - |
        until redis-cli -h redis-master -p 6379 ping 2>/dev/null | grep -q PONG; do
          echo "waiting for redis-master..."
          sleep 1
        done
        echo 'port 26379' > /tmp/sentinel.conf
        echo 'bind 0.0.0.0' >> /tmp/sentinel.conf
        echo 'sentinel resolve-hostnames yes' >> /tmp/sentinel.conf
        echo 'sentinel announce-hostnames yes' >> /tmp/sentinel.conf
        echo 'sentinel monitor mymaster redis-master 6379 1' >> /tmp/sentinel.conf
        echo 'sentinel down-after-milliseconds mymaster 2000' >> /tmp/sentinel.conf
        echo 'sentinel failover-timeout mymaster 5000' >> /tmp/sentinel.conf
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - flight-net

  # --------------------------------------------------------------------------
  # Application services
  # --------------------------------------------------------------------------
  flight-service:
    build:
      context: .
      dockerfile: flight-service/Dockerfile
    environment:
      GRPC_PORT: "50051"
      FLIGHT_DB_DSN: "postgres://user:pass@flight-postgres:5432/flight_db?sslmode=disable"
      API_KEY: "secret-api-key"
      REDIS_ADDR: "redis-master:6379"
      CACHE_TTL_FLIGHT_SEC: "300"
      CACHE_TTL_SEARCH_SEC: "300"
      REDIS_SENTINEL_ADDRS: "redis-sentinel:26379"
      REDIS_SENTINEL_MASTER: "mymaster"
    ports:
      - "50051:50051"
    depends_on:
      flight-postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    networks:
      - flight-net
    restart: on-failure

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    environment:
      HTTP_PORT: "8080"
      BOOKING_DB_DSN: "postgres://user:pass@booking-postgres:5432/booking_db?sslmode=disable"
      FLIGHT_SERVICE_ADDR: "flight-service:50051"
      FLIGHT_SERVICE_API_KEY: "secret-api-key"
      GRPC_MAX_RETRIES: "3"
      GRPC_RETRY_BASE_MS: "100"
      CB_FAILURE_THRESHOLD: "5"
      CB_TIMEOUT_SEC: "30"
      CB_HALF_OPEN_MAX: "1"
    ports:
      - "8080:8080"
    depends_on:
      booking-postgres:
        condition: service_healthy
      flight-service:
        condition: service_started
    networks:
      - flight-net
    restart: on-failure

volumes:
  booking-pgdata:
  flight-pgdata:
  redis-master-data:
  redis-replica-data:
