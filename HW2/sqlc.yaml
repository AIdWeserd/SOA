version: "2"
sql:
  - engine: postgresql
    queries: db/queries/
    schema: db/migrations/
    gen:
      go:
        package: db
        out: .build/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:

          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - db_type: "numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"
              
          - db_type: "pg_catalog.numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"

          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"